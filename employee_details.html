<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">Navbar</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Link</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Dropdown
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">Action</a></li>
                                <li><a class="dropdown-item" href="#">Another action</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li><a class="dropdown-item" href="#">Something else here</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <section class="mt-5">
        <div class="container">

            <div class="row justify-content-center">

                <div class="col-md-12 border border-primary p-4">

                    <h2 class="text-center mb-4">Employee Contact Form</h2>

                    

                        <div class="row">

                            <!-- Name -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Employee Name</label>
                                <input type="text" class="form-control" placeholder="Enter name">
                            </div>

                            <!-- Email -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email ID</label>
                                <input type="email" class="form-control" placeholder="Enter email">
                            </div>

                            <!-- Phone -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" placeholder="Enter phone">
                            </div>

                            <!-- Employee ID -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Employee ID</label>
                                <input type="number" class="form-control" placeholder="Enter ID">
                            </div>

                            <!-- Password -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control">
                            </div>

                            <!-- Department -->
                            <div class="col-md-6 mb-4">
                                <label class="form-label">Department</label>

                                <select class="form-select">
                                    <option>Select Department</option>
                                    <option>HR</option>
                                    <option>IT</option>
                                    <option>Finance</option>
                                    <option>Marketing</option>
                                </select>

                            </div>

                            <!-- Gender -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label d-block">Gender</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Female</label>
                                </div>

                            </div>

                            <!-- Date -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Joining Date</label>
                                <input type="date" class="form-control">
                            </div>

                            <!-- Address -->
                            <div class="col-12 mb-3">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" rows="3"></textarea>
                            </div>

                            <!-- Salary Range -->
                            <div class="col-6 mb-3">
                                <label class="form-label">Salary Range</label>

                                <input type="range" class="form-range" min="10000" max="100000" step="5000">

                                <div class="d-flex justify-content-between">
                                    <span>10,000</span>
                                    <span>100,000</span>
                                </div>

                            </div>

                            <!-- File Upload -->
                            <div class="col-12 mb-3">
                                <label class="form-label">Upload Resume</label>
                                <input type="file" class="form-control">
                            </div>

                            <!-- Checkbox -->
                            <div class="col-12 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox">
                                    <label class="form-check-label">
                                        I agree to terms and conditions
                                    </label>
                                </div>
                            </div>

                            <!-- Buttons -->
                            <div class="col-12 text-center">

                                <button type="submit" class="btn btn-success px-4">
                                    Submit
                                </button>

                                <button type="reset" class="btn btn-danger px-4">
                                    Reset
                                </button>

                            </div>

                        </div>

                    

                </div>
            </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
