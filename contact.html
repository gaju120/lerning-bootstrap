    <section class="mt-5">
        <div class="container">
            <div class="row d-flex justify-content-center border border-body">

                    <a href="https://www.facebook.com/" target="_blank">

                    </div>

                     <i class="bi bi-instagram social"></i>
                    </a>

        </div>

    <section class="mt-5">
        <div class="container">
            <div class="row">
                <div class="col-md-6 border border-primary p-4">
                    <h2>contact form</h2>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="md-3">

                                <label for="exampleFormControlInput1" class="form-label">name</label>
                                <input type="text" class="form-control" id="exampleFormControlInput1"
                                    placeholder="name@example.com">
                            </div>

                        </div>
                        <div class="col-md-6">
                            <div class="md-3">

                                <label for="exampleFormControlInput1" class="form-label">email id</label>
                                <input type="text" class="form-control" id="exampleFormControlInput1"
                                    placeholder="email id">
                            </div>

                        </div>
                        <div class="col-md-6">
                            <div class="md-3">

                                <label for="exampleFormControlInput1" class="form-label">email</label>
                                <input type="text" class="form-control" id="exampleFormControlInput1"
                                    placeholder="email">
                            </div>

                        </div>
                        <div class="col-md-6">
                            <div class="md-3">

                                <label for="exampleFormControlInput1" class="form-label">subject</label>
                                <input type="text" class="form-control" id="exampleFormControlInput1"
                                    placeholder="subject">
                            </div>

                        </div>

                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">contry</label>
                                <select class="form-select  mb-3" aria-label="Large select example">
                                <option selected>choose</option>
                                <option value="1">us</option>
                                <option value="2">india</option>
                                <option value="3">uk</option>
                            </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">state</label>
                                <select class="form-select  mb-3" aria-label="Large select example">
                                <option selected>choose</option>
                                <option value="1">us</option>
                                <option value="2">india</option>
                                <option value="3">uk</option>
                            </select>
                            </div>
                        </div>
                        <div class="col-md-4">
                             <div class="mb-3">
                                <label for="exampleFormControlInput1" class="form-label">city</label>
                                <select class="form-select  mb-3" aria-label="Large select example">
                                <option selected>choose</option>
                                <option value="1">latur</option>
                                <option value="2">pune</option>
                                <option value="3">beed</option>
                            </select>
                            </div>
                        </div>
                         <div class="col-md-6 mb-3">
                                <label class="form-label d-block">Gender</label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Male</label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender">
                                    <label class="form-check-label">Female</label>
                                </div>

                            </div>


                    </div>
                </div>

            </div>
            <div class="col-md-6"></div>

        </div>
        </div>
    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
